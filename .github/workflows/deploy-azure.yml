# Auto-generated by AgentForge — GitHub Actions → Azure Container Apps
# Manual dispatch only (does not run on push). Triggered by AgentForge via
# POST /deployments/{agent_id} (workflow_dispatch) or Actions → Run workflow.
# AZURE_* secrets are injected into the "production" environment on connect.

name: Deploy to Azure Container Apps

on:
  workflow_dispatch:
    inputs:
      deployment_job_id:
        description: "AgentForge deployment job ID"
        required: false
        default: ""
      api_callback_url:
        description: "URL to POST the service URL back to AgentForge"
        required: false
        default: ""
      agent_slug:
        description: "Agent slug (informational)"
        required: false
        default: "saas-sales-meeting-scheduler-2"
      container_app_name:
        description: "Azure Container App name (max 32 chars)"
        required: false
        default: "agent-saas-sales-meeting-schedul"

permissions:
  contents: read
  id-token: write  # Required for OIDC login

env:
  APP_NAME: ${{ inputs.container_app_name || 'agent-saas-sales-meeting-schedul' }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Remove failed Container App (if any)
        run: |
          STATE=$(az containerapp show \
            --name "${{ env.APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "properties.provisioningState" -o tsv 2>/dev/null || echo "NotFound")
          if [ "$STATE" = "Failed" ]; then
            echo "Container App is in Failed state — deleting so deploy can recreate it"
            az containerapp delete \
              --name "${{ env.APP_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --yes
          fi

      - name: Deploy to Azure Container Apps
        id: deploy
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}
          acrName: ${{ secrets.AZURE_ACR_NAME }}
          acrUsername: ${{ secrets.ACR_USERNAME }}
          acrPassword: ${{ secrets.ACR_PASSWORD }}
          containerAppName: ${{ env.APP_NAME }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppEnvironment: ${{ secrets.AZURE_CONTAINER_APP_ENV }}
          targetPort: 8080
          ingress: external

      - name: Get Container App URL
        id: get-url
        run: |
          FQDN=$(az containerapp show \
            --name "${{ env.APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "url=https://$FQDN" >> "$GITHUB_OUTPUT"

      - name: Health check
        run: |
          URL="${{ steps.get-url.outputs.url }}/health"
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            [ "$STATUS" = "200" ] && echo "Health check passed" && exit 0
            echo "Attempt $i: HTTP $STATUS — retrying in 10s"
            sleep 10
          done
          echo "Health check failed" && exit 1

      - name: Get revision metadata
        id: revision
        run: |
          REV=$(az containerapp revision list \
            --name "${{ env.APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "sort_by(@, &properties.createdTime) | [-1].name" -o tsv)
          IMAGE=$(az containerapp show \
            --name "${{ env.APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "properties.template.containers[0].image" -o tsv)
          TAG=$(echo "$IMAGE" | awk -F: '{print $NF}')
          echo "revision_name=$REV" >> "$GITHUB_OUTPUT"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image_digest=" >> "$GITHUB_OUTPUT"

      - name: Report deployment to AgentForge
        if: steps.get-url.outputs.url != ''
        run: |
          CALLBACK="${{ inputs.api_callback_url || 'http://localhost:8000/api/v1/deployments/DEPLOYMENT_JOB_ID/report-url' }}"
          if [ -n "$CALLBACK" ]; then
            curl -s -X POST "$CALLBACK" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg url "${{ steps.get-url.outputs.url }}" \
                --arg run_id "${{ github.run_id }}" \
                --arg app "${{ env.APP_NAME }}" \
                --arg rev "${{ steps.revision.outputs.revision_name }}" \
                --arg tag "${{ steps.revision.outputs.image_tag }}" \
                --arg digest "${{ steps.revision.outputs.image_digest }}" \
                '{service_url:$url, github_run_id:$run_id, container_app_name:$app, revision_name:$rev, image_tag:$tag, image_digest:$digest}')"
          fi
