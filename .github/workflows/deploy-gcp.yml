# Auto-generated by AgentForge — GitHub Actions → GCP Cloud Run
# Manual dispatch only (does not run on push). Set DEFAULT_DEPLOYMENT_PROVIDER=gcp
# in AgentForge and dispatch via POST /deployments/{agent_id} when ready.
# Required GitHub Secrets:
#   GCP_WORKLOAD_IDENTITY_PROVIDER  (Workload Identity Federation provider)
#   GCP_SERVICE_ACCOUNT             (Service account email)
#   GCP_REGION                      (e.g. us-central1)

name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      deployment_job_id:
        description: "AgentForge deployment job ID"
        required: false
        default: ""
      api_callback_url:
        description: "URL to POST the service URL back to AgentForge"
        required: false
        default: ""
      agent_slug:
        description: "Agent slug (used as Cloud Run service name)"
        required: false
        default: "saas-sales-meeting-scheduler-2"

permissions:
  contents: read
  id-token: write

env:
  SERVICE_NAME: agent-${{ inputs.agent_slug || 'saas-sales-meeting-scheduler-2' }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ secrets.GCP_REGION }}
          source: .
          flags: >-
            --port=8080
            --allow-unauthenticated
            --min-instances=0

      - name: Health check
        run: |
          URL="${{ steps.deploy.outputs.url }}/health"
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            [ "$STATUS" = "200" ] && echo "Health check passed" && exit 0
            echo "Attempt $i: HTTP $STATUS — retrying in 10s"
            sleep 10
          done
          echo "Health check failed" && exit 1

      - name: Report service URL to AgentForge
        if: steps.deploy.outputs.url != ''
        run: |
          curl -s -X POST "http://localhost:8000/api/v1/deployments/DEPLOYMENT_JOB_ID/report-url" \
            -H "Content-Type: application/json" \
            -d "{\"service_url\": \"${{ steps.deploy.outputs.url }}\", \"github_run_id\": \"${{ github.run_id }}\"}"

      - name: Report service URL to AgentForge
        if: >
          steps.deploy.outputs.url != '' &&
          (inputs.api_callback_url != '' || 'http://localhost:8000/api/v1/deployments/DEPLOYMENT_JOB_ID/report-url' != '')
        run: |
          CALLBACK="${{ inputs.api_callback_url || 'http://localhost:8000/api/v1/deployments/DEPLOYMENT_JOB_ID/report-url' }}"
          if [ -n "$CALLBACK" ]; then
            curl -s -X POST "$CALLBACK" \
              -H "Content-Type: application/json" \
              -d "{\"service_url\": \"${{ steps.deploy.outputs.url }}\", \"github_run_id\": \"${{ github.run_id }}\"}"
          fi
